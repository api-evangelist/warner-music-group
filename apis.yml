description: >-
  Warner Music Group is one of the major record labels in the music industry,
  with recorded music and music publishing operations spanning a roster of
  artists, songwriters, and labels around the world. WMG includes Warner
  Records, Atlantic Records, Elektra Records, and Warner Chappell Music
  (one of the world's largest music publishing companies). WMG provides
  music licensing APIs and developer tools for integrating licensed music
  into applications.
