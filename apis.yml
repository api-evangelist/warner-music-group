    description: >-
      The Warner Music Group Licensing API enables content creators and
      developers to request synchronization licenses, mechanical licenses,
      and other music rights for WMG's catalog of recordings and compositions.
      The API covers tracks from Warner Records, Atlantic Records, Elektra,
      and Warner Chappell Music publishing.
