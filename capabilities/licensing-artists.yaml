naftiko: 1.0.0-alpha2
info:
  label: Warner Music Group Licensing API — Artists
  description: 'Warner Music Group Licensing API — Artists. 1 operations. Lead operation: Get Artist. Self-contained Naftiko
    capability covering one Warner Music Group business surface.'
  tags:
  - Warner Music Group
  - Artists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WARNER_MUSIC_GROUP_API_KEY: WARNER_MUSIC_GROUP_API_KEY
capability:
  consumes:
  - type: http
    namespace: licensing-artists
    baseUri: https://api.wmg.com
    description: Warner Music Group Licensing API — Artists business capability. Self-contained, no shared references.
    resources:
    - name: v1-artists-artistId
      path: /v1/artists/{artistId}
      operations:
      - name: getartist
        method: GET
        description: Get Artist
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: artistId
          in: path
          type: string
          description: WMG artist identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.WARNER_MUSIC_GROUP_API_KEY}}'
  exposes:
  - type: rest
    namespace: licensing-artists-rest
    port: 8080
    description: REST adapter for Warner Music Group Licensing API — Artists. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/artists/{artistid}
      name: v1-artists-artistid
      description: REST surface for v1-artists-artistId.
      operations:
      - method: GET
        name: getartist
        description: Get Artist
        call: licensing-artists.getartist
        with:
          artistId: rest.artistId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: licensing-artists-mcp
    port: 9090
    transport: http
    description: MCP adapter for Warner Music Group Licensing API — Artists. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-artist
      description: Get Artist
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: licensing-artists.getartist
      with:
        artistId: tools.artistId
      outputParameters:
      - type: object
        mapping: $.
