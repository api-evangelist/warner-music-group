naftiko: "1.0.0-alpha1"

info:
  label: "Warner Music Group Licensing API"
  description: >-
    WMG Licensing API for searching the music catalog and requesting sync,
    mechanical, digital, and performance licenses for recordings and compositions
    from Warner Records, Atlantic Records, Elektra, and Warner Chappell Music.
  tags:
    - Warner Music Group
    - Music Licensing
    - Catalog
    - Sync Licensing
    - Entertainment
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WMG_ACCESS_TOKEN: WMG_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: wmg-licensing
      baseUri: https://api.wmg.com
      description: "Warner Music Group Licensing API"
      authentication:
        type: bearer
        token: "{{WMG_ACCESS_TOKEN}}"
      resources:
        - name: catalog-search
          path: /v1/catalog/search
          description: Music catalog search
          operations:
            - name: search-catalog
              method: GET
              description: Search WMG catalog for recordings and compositions
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: Search query
                - name: type
                  in: query
                  type: string
                  required: false
                  description: Recording, composition, or both
                - name: label
                  in: query
                  type: string
                  required: false
                  description: Filter by label
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Max results
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: track
          path: /v1/tracks/{isrc}
          description: Track details by ISRC
          operations:
            - name: get-track
              method: GET
              description: Get track details by ISRC code
              inputParameters:
                - name: isrc
                  in: path
                  type: string
                  required: true
                  description: International Standard Recording Code
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: artist
          path: /v1/artists/{artistId}
          description: Artist information
          operations:
            - name: get-artist
              method: GET
              description: Get artist profile and catalog summary
              inputParameters:
                - name: artistId
                  in: path
                  type: string
                  required: true
                  description: WMG artist identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: licenses
          path: /v1/licenses
          description: License request management
          operations:
            - name: list-licenses
              method: GET
              description: List submitted license requests
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: Filter by status
                - name: licenseType
                  in: query
                  type: string
                  required: false
                  description: Filter by license type
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: request-license
              method: POST
              description: Submit a new music license request
              inputParameters:
                - name: trackIsrc
                  in: body
                  type: string
                  required: true
                  description: ISRC of the recording to license
                - name: licenseType
                  in: body
                  type: string
                  required: true
                  description: Type of license (sync, mechanical, digital, performance)
                - name: territory
                  in: body
                  type: string
                  required: true
                  description: License territory
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  trackIsrc: "{{tools.trackIsrc}}"
                  licenseType: "{{tools.licenseType}}"
                  useCase: "{{tools.useCase}}"
                  territory: "{{tools.territory}}"
                  startDate: "{{tools.startDate}}"
                  endDate: "{{tools.endDate}}"

  exposes:
    - type: rest
      port: 8100
      namespace: wmg-licensing-api
      resources:
        - path: /v1/catalog/search
          name: catalog-search
          operations:
            - method: GET
              name: search-catalog
              description: Search music catalog
              call: "wmg-licensing.search-catalog"
              with:
                q: "rest.q"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/licenses
          name: licenses
          operations:
            - method: GET
              name: list-licenses
              description: List licenses
              call: "wmg-licensing.list-licenses"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: wmg-licensing-mcp
      transport: http
      tools:
        - name: search-catalog
          description: Search the WMG music catalog
          hints:
            readOnly: true
            openWorld: true
          call: "wmg-licensing.search-catalog"
          with:
            q: "tools.q"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-track
          description: Get track details by ISRC
          hints:
            readOnly: true
            openWorld: false
          call: "wmg-licensing.get-track"
          with:
            isrc: "tools.isrc"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-licenses
          description: List submitted music license requests
          hints:
            readOnly: true
            openWorld: false
          call: "wmg-licensing.list-licenses"
          outputParameters:
            - type: object
              mapping: "$."
